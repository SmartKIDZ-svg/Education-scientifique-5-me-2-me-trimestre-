<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartKiDZ - اختبارات العلوم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1f1a;
    --card: #122018;
    --card2: #172a22;
    --accent: #3ecf8e;
    --accent2: #2db87a;
    --gold: #f5c518;
    --green: #3ecf8e;
    --red: #e74c3c;
    --text: #e0f0e8;
    --muted: #7aab90;
    --border: #1e3d2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 32px 0;
    background-image:
      radial-gradient(ellipse at 10% 15%, rgba(62,207,142,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 75%, rgba(62,207,142,0.04) 0%, transparent 55%);
  }

  /* === HEADER === */
  .site-header {
    background: #0a1810;
    border-bottom: 1.5px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  .site-header img { height: 44px; object-fit: contain; }

  /* === SCREENS === */
  .screen { display: none; }
  .screen.active { display: block; }

  /* === INSCRIPTION === */
  #register-screen {
    max-width: 440px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .reg-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
  }
  .reg-title {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .reg-sub {
    color: var(--muted);
    font-size: 0.92rem;
    margin-bottom: 32px;
  }
  .reg-label {
    display: block;
    text-align: right;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .reg-input {
    width: 100%;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 20px;
    transition: border-color 0.2s;
    text-align: right;
  }
  .reg-input:focus { outline: none; border-color: var(--accent); }
  .reg-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 13px;
    padding: 15px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: #0a1f14;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(62,207,142,0.25);
    margin-top: 4px;
  }
  .reg-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(62,207,142,0.35); }
  .reg-error { color: var(--red); font-size: 0.88rem; margin-top: -14px; margin-bottom: 12px; display: none; }

  /* === HOME === */
  #home-screen {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px;
  }
  .welcome-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .welcome-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }
  .welcome-name span { color: var(--accent); }
  .logout-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  .page-title { font-size: 1.5rem; font-weight: 900; color: var(--accent); margin-bottom: 2px; }
  .page-trimester { font-size: 0.92rem; color: var(--muted); margin-bottom: 28px; }

  .quiz-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 500px) { .quiz-cards { grid-template-columns: 1fr; } }

  .quiz-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 22px 18px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.3s ease;
  }
  .quiz-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 32px rgba(62,207,142,0.12); }
  .quiz-card:hover::after { transform: scaleX(1); transform-origin: left; }
  .quiz-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
  .quiz-title { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 5px; }
  .quiz-sub { font-size: 0.8rem; color: var(--muted); }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .badge {
    display: inline-block;
    background: rgba(62,207,142,0.12);
    color: var(--accent);
    border-radius: 8px;
    padding: 2px 10px;
    font-size: 0.77rem;
    font-weight: 700;
  }
  .last-score {
    font-size: 0.78rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 8px;
    display: none;
  }
  .last-score.show { display: inline-block; }
  .last-score.great { background: rgba(62,207,142,0.15); color: var(--green); }
  .last-score.good { background: rgba(245,197,24,0.15); color: var(--gold); }
  .last-score.poor { background: rgba(231,76,60,0.12); color: var(--red); }

  /* === QUIZ === */
  #quiz-screen { max-width: 680px; margin: 0 auto; padding: 28px 20px; }
  .quiz-header { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
  .back-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.88rem;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .progress-wrap { flex: 1; }
  .quiz-name { font-size: 0.92rem; font-weight: 700; color: var(--accent); margin-bottom: 5px; text-align: center; }
  .progress-bar { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent2)); height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .q-counter { font-size: 0.78rem; color: var(--muted); text-align: center; margin-top: 4px; }
  .question-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 30px 24px 24px; margin-bottom: 16px; }
  .q-num { display: inline-block; background: rgba(62,207,142,0.12); color: var(--accent); border-radius: 8px; padding: 2px 12px; font-size: 0.8rem; font-weight: 700; margin-bottom: 14px; }
  .question-text { font-size: 1.15rem; font-weight: 700; line-height: 1.75; color: var(--text); margin-bottom: 26px; text-align: center; }
  .options-grid { display: grid; gap: 10px; }
  .option-btn {
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 13px;
    padding: 13px 18px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.97rem;
    color: var(--text);
    text-align: right;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(62,207,142,0.07); }
  .option-label { background: var(--border); color: var(--muted); border-radius: 7px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; transition: all 0.2s; }
  .option-btn.correct { border-color: var(--green); background: rgba(62,207,142,0.1); }
  .option-btn.correct .option-label { background: var(--green); color: #0a1f14; }
  .option-btn.wrong { border-color: var(--red); background: rgba(231,76,60,0.09); }
  .option-btn.wrong .option-label { background: var(--red); color: white; }
  .option-btn:disabled { cursor: default; }
  .feedback { text-align: center; padding: 11px; border-radius: 11px; font-size: 0.97rem; font-weight: 700; margin-top: 10px; display: none; animation: popIn 0.3s ease; }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(62,207,142,0.1); color: var(--green); }
  .feedback.nok { background: rgba(231,76,60,0.09); color: var(--red); }
  @keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .next-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 13px; padding: 15px; font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700; color: #0a1f14; cursor: pointer; display: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(62,207,142,0.2); }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(62,207,142,0.3); }
  .next-btn.show { display: block; animation: popIn 0.3s ease; }

  /* === RESULT === */
  #result-screen { max-width: 480px; margin: 0 auto; padding: 32px 20px; text-align: center; }
  .result-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 24px; padding: 48px 28px; }
  .result-emoji { font-size: 3.8rem; margin-bottom: 12px; display: block; animation: bounce 0.5s ease; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
  .result-score { font-size: 3.4rem; font-weight: 900; color: var(--accent); margin-bottom: 6px; }
  .result-pct { font-size: 1.1rem; color: var(--muted); margin-bottom: 10px; }
  .stars { font-size: 1.7rem; letter-spacing: 4px; margin-bottom: 14px; }
  .result-msg { font-size: 1.05rem; font-weight: 600; line-height: 1.65; color: var(--text); margin-bottom: 30px; }
  .result-btns { display: flex; gap: 12px; }
  .btn-retry, .btn-home { flex: 1; padding: 13px; border-radius: 12px; font-family: 'Tajawal', sans-serif; font-size: 0.97rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-retry { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0a1f14; box-shadow: 0 4px 16px rgba(62,207,142,0.2); }
  .btn-retry:hover { transform: translateY(-2px); }
  .btn-home { background: var(--card2); border: 1.5px solid var(--border); color: var(--muted); }
  .btn-home:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

const LABELS = ['أ','ب','ج','د'];
let cQuiz=null, cQ=0, score=0, answered=false;
let userName='', userAge='';
// scores stored as object: { quizId: { score, total } }
let scores = {};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function register() {
  const name = document.getElementById('input-name').value.trim();
  const age = parseInt(document.getElementById('input-age').value);
  let ok = true;
  document.getElementById('err-name').style.display = 'none';
  document.getElementById('err-age').style.display = 'none';
  if (!name) { document.getElementById('err-name').style.display = 'block'; ok = false; }
  if (!age || age < 5 || age > 18) { document.getElementById('err-age').style.display = 'block'; ok = false; }
  if (!ok) return;
  userName = name; userAge = age;
  document.getElementById('user-name-display').textContent = userName;
  buildCards();
  showScreen('home-screen');
}

function logout() {
  userName = ''; userAge = '';
  document.getElementById('input-name').value = '';
  document.getElementById('input-age').value = '';
  scores = {};
  showScreen('register-screen');
}

function buildCards() {
  const c = document.getElementById('cards');
  c.innerHTML = '';
  QUIZZES.forEach((q,i) => {
    const d = document.createElement('div');
    d.className = 'quiz-card';
    const sc = scores[q.id];
    let scoreHtml = '';
    if (sc) {
      const pct = Math.round(sc.score / sc.total * 100);
      let cls = pct >= 75 ? 'great' : pct >= 50 ? 'good' : 'poor';
      scoreHtml = `<span class="last-score show ${cls}">آخر نتيجة: ${sc.score}/${sc.total}</span>`;
    }
    d.innerHTML = `
      <span class="quiz-icon">${q.icon}</span>
      <div class="quiz-title">${q.title}</div>
      <div class="quiz-sub">${q.sub}</div>
      <div class="card-footer">
        <span class="badge">${q.questions.length} أسئلة</span>
        ${scoreHtml}
      </div>
    `;
    d.onclick = () => start(i);
    c.appendChild(d);
  });
}

function start(i) {
  cQuiz = QUIZZES[i]; cQ = 0; score = 0; answered = false;
  document.getElementById('quiz-name').textContent = cQuiz.title;
  showScreen('quiz-screen');
  render();
}

function render() {
  const q = cQuiz.questions[cQ];
  const total = cQuiz.questions.length;
  answered = false;
  document.getElementById('prog-fill').style.width = (cQ/total*100)+'%';
  document.getElementById('q-counter').textContent = `السؤال ${cQ+1} من ${total}`;
  document.getElementById('q-num').textContent = `سؤال ${cQ+1}`;
  document.getElementById('q-text').textContent = q.q;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn';
  nb.textContent = cQ === total-1 ? 'عرض النتيجة 🎉' : 'السؤال التالي ←';
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'options-grid';
  q.opts.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${LABELS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => pick(btn, i, q.ans, grid);
    grid.appendChild(btn);
  });
  opts.appendChild(grid);
}

function pick(btn, idx, correct, grid) {
  if (answered) return;
  answered = true;
  grid.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  if (idx === correct) { btn.classList.add('correct'); score++; showFB(true); }
  else { btn.classList.add('wrong'); grid.querySelectorAll('.option-btn')[correct].classList.add('correct'); showFB(false); }
  document.getElementById('next-btn').classList.add('show');
}

function showFB(ok) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'nok');
  fb.textContent = ok
    ? ['أحسنت! ✅','ممتاز! 🌟','صحيح تماماً! 👏','رائع! 🎉'][Math.floor(Math.random()*4)]
    : ['خطأ! ❌ راجع الإجابة الصحيحة','ليس صحيحاً ❌','حاول مرة أخرى! ❌'][Math.floor(Math.random()*3)];
}

function nextQ() {
  if (!answered) return;
  cQ++;
  if (cQ >= cQuiz.questions.length) showResult();
  else render();
}

function showResult() {
  const total = cQuiz.questions.length;
  const pct = Math.round(score/total*100);
  scores[cQuiz.id] = { score, total };
  let emoji, stars, msg;
  if (pct===100){ emoji='🏆'; stars='⭐⭐⭐'; msg='علامة كاملة! أنت بطل العلوم! 🌟'; }
  else if (pct>=75){ emoji='😊'; stars='⭐⭐'; msg='عمل رائع! استمر في المراجعة!'; }
  else if (pct>=50){ emoji='🙂'; stars='⭐'; msg='جيد! يمكنك التحسين، أعد المحاولة!'; }
  else { emoji='📚'; stars=''; msg='راجع الدرس مرة أخرى ثم حاول من جديد!'; }
  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-stars').textContent = stars;
  document.getElementById('r-score').textContent = score+' / '+total;
  document.getElementById('r-pct').textContent = pct+'%';
  document.getElementById('r-msg').textContent = msg;
  showScreen('result-screen');
}

function retry() { start(QUIZZES.indexOf(cQuiz)); }
function goHome() { buildCards(); showScreen('home-screen'); }
</script>
